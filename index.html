<!DOCTYPE html>
<html head="en">

<head>
  <meta charset="UTF-8">
  <title>rhythm assignment</title>
</head>

<body>
  <div id="app">
    <div id="clip-column"></div>
    <div id="main">
      <div id="canvas-container"></div>
      <div id="controls">
        <button id="play-btn">▶ Play</button>
        <button id="stop-btn">⏹ Stop</button>
        <button id="preview-btn" disabled>💡 Play Selection</button>
        <button id="save-btn" disabled>💾 Save Selection</button>
      </div>
      <div id="timeline-container">
        <div id="timeline"></div>
        <canvas id="timeline-canvas"></canvas>
      </div>
      <div id="timeline-controls">
        <button id="timeline-play-btn">▶ Play Timeline</button>
        <button id="timeline-stop-btn">⏹ Stop Timeline</button>
        <button id="timeline-clear-btn">✕ Clear</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
